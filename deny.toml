# cargo-deny policy. Generated 2026-06-08 from the pre-release sweep.
# Tracks the licenses + advisories + bans that hexray's tree carries
# today; tighten in follow-up PRs as we sort through individual dep
# decisions.

[advisories]
yanked = "warn"
ignore = []

[bans]
multiple-versions = "allow"
wildcards = "allow"

[licenses]
# Standard OSI list that covers everything currently in the tree.
# `Unicode-3.0` shows up via icu_*; `Unicode-DFS-2016` via cuda asset
# decoders. GPL-only deps (which would force the entire workspace
# back to GPL) are excluded by absence — we'd reject them by default.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "GPL-3.0",
    "GPL-3.0-or-later",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]

[sources]
unknown-registry = "warn"
unknown-git = "warn"
